name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
    
    - name: Show Xcode version
      run: xcodebuild -version
    
    - name: Install XcodeGen
      run: brew install xcodegen
    
    - name: Generate project
      run: xcodegen generate
    
    - name: List available simulators
      run: xcrun simctl list devices available | grep -i iphone | head -10
    
    - name: Build
      run: |
        xcodebuild -project Mori.xcodeproj \
          -scheme Mori \
          -configuration Debug \
          -destination 'platform=iOS Simulator,name=iPhone 16' \
          build

  deploy:
    needs: build
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
    
    - name: Build for archive
      run: |
        xcodebuild -project Mori.xcodeproj \
          -scheme Mori \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath build/Mori \
          DEVELOPMENT_TEAM=${{ secrets.DEVELOPMENT_TEAM }} \
          archive
    
    - name: Export .ipa
      run: |
        # Update exportOptions with DEVELOPMENT_TEAM
        /usr/libexec/PlistBuddy -c "Set :signingStyle manual" exportOptions.plist
        /usr/libexec/PlistBuddy -c "Set :developmentTeam ${{ secrets.DEVELOPMENT_TEAM }}" exportOptions.plist
        /usr/libexec/PlistBuddy -c "Set :signingCertificate 'Apple Distribution'" exportOptions.plist
        /usr/libexec/PlistBuddy -c "Set :method 'ad-hoc'" exportOptions.plist
        
        xcodebuild -exportArchive \
          -archivePath build/Mori.xcarchive \
          -exportPath build/output \
          -exportOptionsPlist exportOptions.plist
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mori-ipa
        path: build/output/Mori.ipa
