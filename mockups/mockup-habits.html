<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit +/- - 暖极简设计</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #FAF7F2 0%, #F5EFE6 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }
    
    .title {
      font-size: 32px;
      font-weight: 600;
      color: #3A3630;
    }
    
    .subtitle {
      font-size: 14px;
      color: #8B8680;
      margin-top: 4px;
    }
    
    .add-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: #5D4E37;
      color: white;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 16px rgba(93, 78, 55, 0.2);
    }
    
    .add-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 24px rgba(93, 78, 55, 0.3);
    }
    
    .progress-card {
      background: white;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 4px 16px rgba(93, 78, 55, 0.06);
    }
    
    .progress-label {
      font-size: 14px;
      color: #8B8680;
      margin-bottom: 8px;
    }
    
    .progress-bar {
      height: 8px;
      background: #F5EFE6;
      border-radius: 4px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #5D4E37 0%, #8B9F7A 100%);
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    
    .habit-card {
      background: white;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 4px 16px rgba(93, 78, 55, 0.06);
      transition: all 0.3s;
      cursor: pointer;
    }
    
    .habit-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(93, 78, 55, 0.12);
    }
    
    .habit-header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .habit-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-right: 16px;
    }
    
    .habit-icon.positive {
      background: rgba(139, 159, 122, 0.15);
      color: #8B9F7A;
    }
    
    .habit-icon.negative {
      background: rgba(212, 165, 116, 0.15);
      color: #D4A574;
    }
    
    .habit-name {
      flex: 1;
      font-size: 18px;
      font-weight: 600;
      color: #3A3630;
    }
    
    .habit-status {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .habit-status.completed {
      background: rgba(139, 159, 122, 0.15);
      color: #8B9F7A;
    }
    
    .habit-status.failed {
      background: rgba(184, 122, 122, 0.15);
      color: #B87A7A;
    }
    
    .habit-status.pending {
      background: rgba(139, 134, 128, 0.15);
      color: #8B8680;
    }
    
    .habit-streak {
      font-size: 14px;
      color: #8B8680;
      margin-bottom: 12px;
    }
    
    .habit-streak strong {
      color: #5D4E37;
    }
    
    .habit-progress-bar {
      height: 6px;
      background: #F5EFE6;
      border-radius: 3px;
      overflow: hidden;
    }
    
    .habit-progress-fill {
      height: 100%;
      background: #5D4E37;
      border-radius: 3px;
      transition: width 0.5s ease;
    }
    
    .habit-progress-fill.negative {
      background: #D4A574;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1 class="title">习惯追踪</h1>
        <p class="subtitle">今日: 5/7 已完成</p>
      </div>
      <button class="add-btn">+</button>
    </div>
    
    <div class="progress-card">
      <div class="progress-label">今日进度</div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: 71%"></div>
      </div>
    </div>
    
    <div class="habit-card">
      <div class="habit-header">
        <div class="habit-icon positive">+</div>
        <div class="habit-name">晨间冥想</div>
        <div class="habit-status completed">✓ 已完成</div>
      </div>
      <div class="habit-streak">🔥 连续 <strong>21</strong> 天</div>
      <div class="habit-progress-bar">
        <div class="habit-progress-fill" style="width: 70%"></div>
      </div>
    </div>
    
    <div class="habit-card">
      <div class="habit-header">
        <div class="habit-icon negative">−</div>
        <div class="habit-name">戒除甜食</div>
        <div class="habit-status completed">✓ 坚持</div>
      </div>
      <div class="habit-streak">🔥 连续 <strong>30</strong> 天无糖</div>
      <div class="habit-progress-bar">
        <div class="habit-progress-fill negative" style="width: 100%"></div>
      </div>
    </div>
    
    <div class="habit-card">
      <div class="habit-header">
        <div class="habit-icon positive">+</div>
        <div class="habit-name">阅读30分钟</div>
        <div class="habit-status pending">○ 待完成</div>
      </div>
      <div class="habit-streak">🔥 连续 <strong>7</strong> 天</div>
      <div class="habit-progress-bar">
        <div class="habit-progress-fill" style="width: 23%"></div>
      </div>
    </div>
    
    <div class="habit-card">
      <div class="habit-header">
        <div class="habit-icon positive">+</div>
        <div class="habit-name">运动健身</div>
        <div class="habit-status failed">✗ 今天未完成</div>
      </div>
      <div class="habit-streak">连续 <strong>0</strong> 天</div>
      <div class="habit-progress-bar">
        <div class="habit-progress-fill" style="width: 0%"></div>
      </div>
    </div>
    
    <div class="habit-card">
      <div class="habit-header">
        <div class="habit-icon positive">+</div>
        <div class="habit-name">早起 (6:00前)</div>
        <div class="habit-status completed">✓ 已完成</div>
      </div>
      <div class="habit-streak">🔥 连续 <strong>14</strong> 天</div>
      <div class="habit-progress-bar">
        <div class="habit-progress-fill" style="width: 47%"></div>
      </div>
    </div>
  </div>
</body>
</html>
