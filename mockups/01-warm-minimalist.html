<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mori - 暖极简方案</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #FAF8F5;
            color: #4A4A4A;
            padding: 40px;
        }
        h1 { color: #5D4E37; margin-bottom: 30px; font-weight: 300; letter-spacing: 2px; }
        .section { margin-bottom: 60px; }
        .section-title { color: #8B7355; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }
        
        /* Color Palette */
        .palette {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
        }
        .color-swatch {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            flex-direction: column;
        }
        .primary { background: #FAF8F5; border: 1px solid #E8E4DE; }
        .secondary { background: #F5F1E8; }
        .accent { background: #8B7355; color: white; }
        .dark { background: #5D4E37; color: white; }
        .gray { background: #B8B0A5; color: white; }
        
        /* Life Grid */
        .life-grid {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(93, 78, 55, 0.08);
            display: inline-block;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(80, 3px);
            gap: 1px;
        }
        .grid-cell {
            width: 3px;
            height: 3px;
            background: #E8E4DE;
            border-radius: 1px;
        }
        .grid-cell.filled { background: #8B7355; }
        .grid-cell.current { background: #5D4E37; }
        .grid-label {
            margin-top: 15px;
            color: #8B7355;
            font-size: 12px;
            text-align: center;
        }
        
        /* The Clock */
        .clock-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(93, 78, 55, 0.08);
            display: inline-block;
        }
        .clock {
            width: 200px;
            height: 200px;
            border: 2px solid #E8E4DE;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .clock-center {
            width: 8px;
            height: 8px;
            background: #5D4E37;
            border-radius: 50%;
        }
        .clock-hand {
            position: absolute;
            background: #8B7355;
            transform-origin: bottom center;
        }
        .hour-hand {
            width: 3px;
            height: 50px;
            top: 50px;
        }
        .minute-hand {
            width: 2px;
            height: 70px;
            top: 30px;
            background: #5D4E37;
        }
        .clock-time {
            position: absolute;
            bottom: 30px;
            font-size: 14px;
            color: #8B7355;
            letter-spacing: 2px;
        }
        
        /* Habit +/- */
        .habit-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(93, 78, 55, 0.08);
            max-width: 400px;
        }
        .habit-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #F5F1E8;
        }
        .habit-item:last-child { border-bottom: none; }
        .habit-name { color: #5D4E37; font-size: 16px; }
        .habit-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .habit-btn {
            width: 32px;
            height: 32px;
            border: 1px solid #E8E4DE;
            background: #FAF8F5;
            border-radius: 6px;
            color: #8B7355;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .habit-btn:hover { background: #F5F1E8; }
        .habit-count {
            font-size: 20px;
            font-weight: 300;
            color: #5D4E37;
            min-width: 30px;
            text-align: center;
        }
        
        /* Gratitude */
        .gratitude-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(93, 78, 55, 0.08);
            max-width: 500px;
        }
        .gratitude-title {
            color: #5D4E37;
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: 300;
        }
        .gratitude-input {
            width: 100%;
            border: none;
            border-bottom: 2px solid #E8E4DE;
            padding: 15px 0;
            font-size: 16px;
            color: #5D4E37;
            background: transparent;
            outline: none;
        }
        .gratitude-input::placeholder { color: #B8B0A5; }
        .gratitude-input:focus { border-color: #8B7355; }
        .gratitude-list {
            margin-top: 20px;
        }
        .gratitude-item {
            padding: 12px 0;
            color: #8B7355;
            font-size: 15px;
            display: flex;
            align-items: center;
        }
        .gratitude-item:before {
            content: "·";
            margin-right: 10px;
            color: #5D4E37;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <h1>Mori · 暖极简</h1>
    
    <!-- Color Palette -->
    <div class="palette">
        <div class="color-swatch primary">
            <div>#FAF8F5</div>
            <div style="margin-top:5px;font-size:9px">主色</div>
        </div>
        <div class="color-swatch secondary">
            <div>#F5F1E8</div>
            <div style="margin-top:5px;font-size:9px">辅助</div>
        </div>
        <div class="color-swatch accent">
            <div>#8B7355</div>
            <div style="margin-top:5px;font-size:9px">强调</div>
        </div>
        <div class="color-swatch dark">
            <div>#5D4E37</div>
            <div style="margin-top:5px;font-size:9px">深色</div>
        </div>
        <div class="color-swatch gray">
            <div>#B8B0A5</div>
            <div style="margin-top:5px;font-size:9px">灰色</div>
        </div>
    </div>
    
    <!-- Life Grid -->
    <div class="section">
        <div class="section-title">Life Grid · 80周 × 52年</div>
        <div class="life-grid">
            <div class="grid-container">
                <script>
                    // Generate 80x52 grid
                    for(let i = 0; i < 80*52; i++) {
                        const className = i < 1560 ? 'filled' : (i === 1560 ? 'current' : '');
                        document.write(`<div class="grid-cell ${className}"></div>`);
                    }
                </script>
            </div>
            <div class="grid-label">30 / 80 周 · 已度过 37.5%</div>
        </div>
    </div>
    
    <!-- The Clock -->
    <div class="section">
        <div class="section-title">The Clock</div>
        <div class="clock-container">
            <div class="clock">
                <div class="clock-center"></div>
                <div class="clock-hand hour-hand" style="transform: rotate(150deg);"></div>
                <div class="clock-hand minute-hand" style="transform: rotate(180deg);"></div>
                <div class="clock-time">05:00</div>
            </div>
        </div>
    </div>
    
    <!-- Habit +/- -->
    <div class="section">
        <div class="section-title">Habit +/-</div>
        <div class="habit-container">
            <div class="habit-item">
                <div class="habit-name">阅读</div>
                <div class="habit-controls">
                    <button class="habit-btn">−</button>
                    <div class="habit-count">3</div>
                    <button class="habit-btn">+</button>
                </div>
            </div>
            <div class="habit-item">
                <div class="habit-name">冥想</div>
                <div class="habit-controls">
                    <button class="habit-btn">−</button>
                    <div class="habit-count">1</div>
                    <button class="habit-btn">+</button>
                </div>
            </div>
            <div class="habit-item">
                <div class="habit-name">运动</div>
                <div class="habit-controls">
                    <button class="habit-btn">−</button>
                    <div class="habit-count">2</div>
                    <button class="habit-btn">+</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Gratitude -->
    <div class="section">
        <div class="section-title">Gratitude</div>
        <div class="gratitude-container">
            <div class="gratitude-title">今天，我感恩...</div>
            <input type="text" class="gratitude-input" placeholder="写下你的感恩...">
            <div class="gratitude-list">
                <div class="gratitude-item">早晨的阳光透过窗帘</div>
                <div class="gratitude-item">一杯热咖啡的温度</div>
                <div class="gratitude-item">朋友的问候信息</div>
            </div>
        </div>
    </div>
</body>
</html>
