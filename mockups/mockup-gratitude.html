<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gratitude - 暖极简设计</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #FAF7F2 0%, #F5EFE6 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .header {
      margin-bottom: 40px;
    }
    
    .title {
      font-size: 32px;
      font-weight: 600;
      color: #3A3630;
    }
    
    .subtitle {
      font-size: 14px;
      color: #8B8680;
      margin-top: 4px;
    }
    
    .date-header {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .date-display {
      font-size: 20px;
      color: #8B8680;
      font-weight: 500;
    }
    
    .main-card {
      background: white;
      border-radius: 24px;
      padding: 48px;
      box-shadow: 0 8px 32px rgba(93, 78, 55, 0.08);
      margin-bottom: 32px;
    }
    
    .prompt {
      font-size: 24px;
      color: #5D4E37;
      margin-bottom: 40px;
      font-weight: 500;
    }
    
    .gratitude-item {
      margin-bottom: 32px;
    }
    
    .gratitude-number {
      display: inline-block;
      width: 32px;
      height: 32px;
      background: #F5EFE6;
      color: #5D4E37;
      border-radius: 50%;
      text-align: center;
      line-height: 32px;
      font-weight: 600;
      margin-right: 12px;
    }
    
    .gratitude-input {
      width: calc(100% - 50px);
      border: none;
      border-bottom: 2px solid #D4D0C8;
      font-size: 18px;
      color: #3A3630;
      padding: 8px 0;
      transition: border-color 0.3s;
      background: transparent;
    }
    
    .gratitude-input:focus {
      outline: none;
      border-bottom-color: #5D4E37;
    }
    
    .gratitude-input::placeholder {
      color: #B0B5BD;
    }
    
    .tags {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-left: 44px;
      flex-wrap: wrap;
    }
    
    .tag {
      padding: 6px 14px;
      background: #F5EFE6;
      border-radius: 20px;
      font-size: 13px;
      color: #8B8680;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .tag:hover {
      background: #5D4E37;
      color: white;
    }
    
    .memory-card {
      background: #F5EFE6;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 32px;
    }
    
    .memory-header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .memory-icon {
      font-size: 24px;
      margin-right: 12px;
    }
    
    .memory-title {
      font-size: 16px;
      color: #8B8680;
      font-weight: 500;
    }
    
    .memory-date {
      font-size: 12px;
      color: #8B8680;
      margin-left: auto;
    }
    
    .memory-content {
      font-size: 15px;
      color: #5D4E37;
      line-height: 1.6;
      font-style: italic;
    }
    
    .save-btn {
      width: 100%;
      padding: 20px;
      background: #5D4E37;
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 16px rgba(93, 78, 55, 0.2);
    }
    
    .save-btn:hover {
      background: #4A3F2C;
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(93, 78, 55, 0.3);
    }
    
    .stats-bar {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 32px;
    }
    
    .stat-item {
      text-align: center;
      padding: 16px 24px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(93, 78, 55, 0.06);
    }
    
    .stat-number {
      font-size: 28px;
      font-weight: 700;
      color: #5D4E37;
    }
    
    .stat-text {
      font-size: 12px;
      color: #8B8680;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="title">感恩日记</h1>
      <p class="subtitle">记录生活中的美好瞬间</p>
    </div>
    
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-number">128</div>
        <div class="stat-text">记录天数</div>
      </div>
      <div class="stat-item">
        <div class="stat-number">384</div>
        <div class="stat-text">感恩事项</div>
      </div>
      <div class="stat-item">
        <div class="stat-number">21</div>
        <div class="stat-text">连续天数</div>
      </div>
    </div>
    
    <div class="date-header">
      <div class="date-display">📅 2026年2月23日 星期日</div>
    </div>
    
    <div class="main-card">
      <div class="prompt">今天，我感恩...</div>
      
      <div class="gratitude-item">
        <span class="gratitude-number">1</span>
        <input type="text" class="gratitude-input" placeholder="写下第一件感恩的事..." value="早晨的阳光洒进房间">
        <div class="tags">
          <span class="tag">☀️ 温暖</span>
          <span class="tag">✨ 宁静</span>
          <span class="tag">🏠 家</span>
        </div>
      </div>
      
      <div class="gratitude-item">
        <span class="gratitude-number">2</span>
        <input type="text" class="gratitude-input" placeholder="写下第二件感恩的事..." value="与好友的深度对话">
        <div class="tags">
          <span class="tag">💬 理解</span>
          <span class="tag">💝 支持</span>
          <span class="tag">👥 友谊</span>
        </div>
      </div>
      
      <div class="gratitude-item">
        <span class="gratitude-number">3</span>
        <input type="text" class="gratitude-input" placeholder="写下第三件感恩的事..." value="完成了困难的项目">
        <div class="tags">
          <span class="tag">💪 成就</span>
          <span class="tag">🌱 成长</span>
          <span class="tag">🎯 目标</span>
        </div>
      </div>
    </div>
    
    <div class="memory-card">
      <div class="memory-header">
        <span class="memory-icon">💡</span>
        <div class="memory-title">随机回忆</div>
        <div class="memory-date">2025年12月15日</div>
      </div>
      <div class="memory-content">
        "我感恩第一次尝试烘焙，虽然蛋糕有点焦，但厨房里充满了香甜的气息，家人笑着说这是最有爱的味道..."
      </div>
    </div>
    
    <button class="save-btn">保存今日感恩</button>
  </div>
</body>
</html>
