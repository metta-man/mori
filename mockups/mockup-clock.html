<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Clock - 暖极简设计</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #FAF7F2 0%, #F5EFE6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .clock-container {
      text-align: center;
    }
    
    .clock-wrapper {
      position: relative;
      width: 400px;
      height: 400px;
      margin: 0 auto 48px;
    }
    
    .progress-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 100%;
    }
    
    .progress-ring circle {
      fill: none;
      stroke-width: 4;
    }
    
    .progress-ring .bg {
      stroke: #D4D0C8;
    }
    
    .progress-ring .progress {
      stroke: #5D4E37;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: center;
      transition: stroke-dashoffset 0.5s ease;
    }
    
    .clock-face {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    
    .time {
      font-size: 72px;
      font-weight: 300;
      color: #3A3630;
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
    }
    
    .seconds {
      font-size: 32px;
      color: #8B8680;
      vertical-align: super;
    }
    
    .day {
      font-size: 20px;
      color: #8B8680;
      margin-top: 8px;
      font-weight: 500;
    }
    
    .date {
      font-size: 16px;
      color: #8B8680;
      margin-top: 4px;
    }
    
    .info-cards {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    
    .info-card {
      background: white;
      padding: 20px 32px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(93, 78, 55, 0.06);
    }
    
    .info-label {
      font-size: 12px;
      color: #8B8680;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    
    .info-value {
      font-size: 24px;
      font-weight: 600;
      color: #5D4E37;
    }
    
    .progress-indicator {
      margin-top: 16px;
      font-size: 14px;
      color: #8B8680;
    }
    
    .progress-indicator strong {
      color: #5D4E37;
    }
  </style>
</head>
<body>
  <div class="clock-container">
    <div class="clock-wrapper">
      <svg class="progress-ring" viewBox="0 0 400 400">
        <circle class="bg" cx="200" cy="200" r="190"></circle>
        <circle class="progress" cx="200" cy="200" r="190" 
                stroke-dasharray="1194" 
                stroke-dashoffset="298.5"
                id="progressCircle"></circle>
      </svg>
      <div class="clock-face">
        <div class="time" id="time">00:00<span class="seconds">00</span></div>
        <div class="day" id="day">星期日</div>
        <div class="date" id="date">2026年2月23日</div>
      </div>
    </div>
    
    <div class="info-cards">
      <div class="info-card">
        <div class="info-label">今日进度</div>
        <div class="info-value" id="dayProgress">75%</div>
      </div>
      <div class="info-card">
        <div class="info-label">任务完成</div>
        <div class="info-value">3/4</div>
      </div>
      <div class="info-card">
        <div class="info-label">本周</div>
        <div class="info-value">第8周</div>
      </div>
    </div>
    
    <div class="progress-indicator">
      今日已过 <strong id="hoursPassed">18</strong> 小时 / 剩余 <strong id="hoursLeft">6</strong> 小时
    </div>
  </div>
  
  <script>
    function updateClock() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      
      document.getElementById('time').innerHTML = 
        `${hours}:${minutes}<span class="seconds">${seconds}</span>`;
      
      // Update progress ring (based on day progress)
      const dayProgress = (now.getHours() * 60 + now.getMinutes()) / (24 * 60);
      const circumference = 1194;
      const offset = circumference * (1 - dayProgress);
      document.getElementById('progressCircle').style.strokeDashoffset = offset;
      
      document.getElementById('dayProgress').textContent = Math.round(dayProgress * 100) + '%';
      document.getElementById('hoursPassed').textContent = now.getHours();
      document.getElementById('hoursLeft').textContent = 24 - now.getHours();
    }
    
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
