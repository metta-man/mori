<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gratitude Journal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #FDF5E6 0%, #FFF8E7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        .container {
            background: #FFF8E7;
            border-radius: 24px;
            padding: 50px;
            box-shadow: 0 8px 32px rgba(51, 51, 51, 0.08);
            width: 100%;
            max-width: 550px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            color: #333333;
            font-size: 24px;
            font-weight: 300;
            margin-bottom: 8px;
        }
        .date {
            color: #4A4A4A;
            font-size: 13px;
            opacity: 0.6;
        }
        .prompt {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(51, 51, 51, 0.04);
        }
        .prompt-text {
            color: #4A4A4A;
            font-size: 15px;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .prompt-input {
            width: 100%;
            border: none;
            border-bottom: 2px solid #F0E6D3;
            padding: 15px 0;
            font-size: 16px;
            color: #333333;
            background: transparent;
            outline: none;
            transition: border-color 0.3s;
        }
        .prompt-input::placeholder {
            color: #D4C5B0;
        }
        .prompt-input:focus {
            border-color: #4A4A4A;
        }
        .history-title {
            color: #4A4A4A;
            font-size: 14px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
        }
        .entry {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            position: relative;
            box-shadow: 0 2px 8px rgba(51, 51, 51, 0.04);
        }
        .entry-dot {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            background: #4A4A4A;
            border-radius: 50%;
        }
        .entry-content {
            margin-left: 25px;
            color: #333333;
            font-size: 15px;
            line-height: 1.5;
        }
        .entry-time {
            color: #D4C5B0;
            font-size: 11px;
            margin-top: 8px;
            margin-left: 25px;
        }
        .streak-badge {
            background: #4A4A4A;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-top: 25px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Gratitude · 感恩日记</h1>
            <div class="date">2026年2月23日 · 星期日</div>
        </div>
        
        <div class="prompt">
            <div class="prompt-text">
                今天，有什么让你感到温暖的瞬间？
            </div>
            <input type="text" class="prompt-input" placeholder="写下你的感恩...">
        </div>
        
        <div class="history-title">今天的记录</div>
        
        <div class="entry">
            <div class="entry-dot"></div>
            <div class="entry-content">早晨的阳光透过窗帘，温暖而柔和</div>
            <div class="entry-time">08:23</div>
        </div>
        
        <div class="entry">
            <div class="entry-dot"></div>
            <div class="entry-content">一杯热咖啡的温度刚刚好</div>
            <div class="entry-time">09:45</div>
        </div>
        
        <div class="entry">
            <div class="entry-dot"></div>
            <div class="entry-content">朋友发来的问候信息，让我笑了</div>
            <div class="entry-time">14:12</div>
        </div>
        
        <div class="entry">
            <div class="entry-dot"></div>
            <div class="entry-content">散步时看到的晚霞很美</div>
            <div class="entry-time">18:30</div>
        </div>
        
        <div style="text-align: center;">
            <div class="streak-badge">🔥 连续记录 15 天</div>
        </div>
    </div>
</body>
</html>
