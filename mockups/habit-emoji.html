<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit +/- with Emoji</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #FDF5E6 0%, #FFF8E7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        .container {
            background: #FFF8E7;
            border-radius: 24px;
            padding: 50px;
            box-shadow: 0 8px 32px rgba(51, 51, 51, 0.08);
            width: 100%;
            max-width: 450px;
        }
        h1 {
            color: #333333;
            font-size: 24px;
            font-weight: 300;
            margin-bottom: 35px;
            text-align: center;
        }
        .habit-item {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(51, 51, 51, 0.04);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .habit-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(51, 51, 51, 0.08);
        }
        .habit-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .habit-emoji {
            font-size: 32px;
        }
        .habit-info {
            display: flex;
            flex-direction: column;
        }
        .habit-name {
            color: #333333;
            font-size: 16px;
            font-weight: 400;
            margin-bottom: 4px;
        }
        .habit-streak {
            color: #4A4A4A;
            font-size: 12px;
            opacity: 0.6;
        }
        .habit-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .habit-btn {
            width: 36px;
            height: 36px;
            border: 2px solid #F0E6D3;
            background: #FFF8E7;
            border-radius: 50%;
            color: #4A4A4A;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .habit-btn:hover {
            border-color: #4A4A4A;
            background: #4A4A4A;
            color: white;
        }
        .habit-count {
            font-size: 28px;
            font-weight: 300;
            color: #333333;
            min-width: 40px;
            text-align: center;
        }
        .add-habit {
            background: white;
            border: 2px dashed #F0E6D3;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            color: #4A4A4A;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .add-habit:hover {
            border-color: #4A4A4A;
            color: #333333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Habit +/- · 习惯追踪</h1>
        
        <div class="habit-item">
            <div class="habit-left">
                <div class="habit-emoji">📚</div>
                <div class="habit-info">
                    <div class="habit-name">阅读</div>
                    <div class="habit-streak">🔥 连续 7 天</div>
                </div>
            </div>
            <div class="habit-controls">
                <button class="habit-btn">−</button>
                <div class="habit-count">3</div>
                <button class="habit-btn">+</button>
            </div>
        </div>
        
        <div class="habit-item">
            <div class="habit-left">
                <div class="habit-emoji">🧘</div>
                <div class="habit-info">
                    <div class="habit-name">冥想</div>
                    <div class="habit-streak">🔥 连续 3 天</div>
                </div>
            </div>
            <div class="habit-controls">
                <button class="habit-btn">−</button>
                <div class="habit-count">1</div>
                <button class="habit-btn">+</button>
            </div>
        </div>
        
        <div class="habit-item">
            <div class="habit-left">
                <div class="habit-emoji">🏃</div>
                <div class="habit-info">
                    <div class="habit-name">运动</div>
                    <div class="habit-streak">🔥 连续 5 天</div>
                </div>
            </div>
            <div class="habit-controls">
                <button class="habit-btn">−</button>
                <div class="habit-count">2</div>
                <button class="habit-btn">+</button>
            </div>
        </div>
        
        <div class="habit-item">
            <div class="habit-left">
                <div class="habit-emoji">💧</div>
                <div class="habit-info">
                    <div class="habit-name">喝水</div>
                    <div class="habit-streak">🔥 连续 12 天</div>
                </div>
            </div>
            <div class="habit-controls">
                <button class="habit-btn">−</button>
                <div class="habit-count">6</div>
                <button class="habit-btn">+</button>
            </div>
        </div>
        
        <div class="add-habit">
            + 添加新习惯
        </div>
    </div>
</body>
</html>
