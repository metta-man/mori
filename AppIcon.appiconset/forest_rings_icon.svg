<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D4739"/>
      <stop offset="100%" style="stop-color:#1E3027"/>
    </linearGradient>
    
    <!-- Center glow gradient -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:0.9"/>
      <stop offset="40%" style="stop-color:#D4A574;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#D4A574;stop-opacity:0"/>
    </radialGradient>
    
    <!-- Ring gradient for depth -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F0E1"/>
      <stop offset="100%" style="stop-color:#E8E0D0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="180" fill="url(#bgGrad)"/>
  
  <!-- Center glow -->
  <circle cx="512" cy="512" r="280" fill="url(#centerGlow)"/>
  
  <!-- Tree rings - outer to inner -->
  <!-- Ring 1 (outermost) -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="#F5F0E1" stroke-width="28" opacity="0.3"/>
  
  <!-- Ring 2 -->
  <circle cx="512" cy="512" r="320" fill="none" stroke="url(#ringGrad)" stroke-width="32" opacity="0.5"/>
  
  <!-- Ring 3 -->
  <circle cx="512" cy="512" r="250" fill="none" stroke="#F5F0E1" stroke-width="36" opacity="0.7"/>
  
  <!-- Ring 4 -->
  <circle cx="512" cy="512" r="170" fill="none" stroke="#F5F0E1" stroke-width="40" opacity="0.85"/>
  
  <!-- Center warm glow -->
  <circle cx="512" cy="512" r="90" fill="#D4A574" opacity="0.6"/>
  
  <!-- Subtle highlight -->
  <circle cx="480" cy="470" r="40" fill="#F5F0E1" opacity="0.3"/>
</svg>
